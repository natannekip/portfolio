<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natasha Kippur | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.7s ease-out forwards; }
        .font-monogram { font-family: 'Playfair Display', serif; }
        ::selection { background-color: #FDF2F2; color: #AD1457; }
    </style>
</head>
<body class="bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Menu, X, ChevronRight, Accessibility, BookOpen, Video, Layout, 
            Mail, Phone, MapPin, ExternalLink, Github, Linkedin, 
            FileText, MousePointer2, Briefcase, Award, ArrowLeft, Sparkles 
        } = LucideReact;

        const App = () => {
            const [activePage, setActivePage] = useState('home');
            const [selectedProject, setSelectedProject] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const profile = {
                name: "Natasha Kippur",
                monogram: "nk",
                title: "Instructional Designer & Accessibility Specialist",
                summary: "Instructional Design and Accessibility Specialist creating clear, engaging learning content. Experienced in microlearning, LMS-based course support (D2L), and visual training design that simplifies complex systems.",
                contact: {
                    phone: "303-506-9657",
                    email: "natashakippur@gmail.com",
                    location: "Denver, CO"
                },
                experience: [
                    {
                        role: "Digital Accessibility Specialist",
                        company: "Front Range Community College - Hybrid",
                        period: "2025 - Present",
                        highlights: [
                            "Develop instructional materials and microlearning content.",
                            "Create visual training resources in Canva.",
                            "Support instructors in building accessible courses in D2L (LMS).",
                            "Simplify complex standards into clear user guidance.",
                            "Produce tutorial videos and walkthroughs.",
                            "Conduct accessibility testing (NVDA, VoiceOver, Narrator).",
                            "Collaborate to improve training and user experience.",
                            "Administer Modern Campus CMS."
                        ]
                    },
                    {
                        role: "Digital Accessibility Fellow",
                        company: "Colorado Secretary of State",
                        period: "2024 - 2025",
                        highlights: [
                            "Create training guides and instructional content.",
                            "Translate audits into clear, actionable guidance.",
                            "Support training and accessibility improvements."
                        ]
                    }
                ],
                projects: [
                    {
                        id: "pitstops",
                        title: "Accessibility Pitstops",
                        category: "Microlearning Series",
                        tag: "Instructional Design",
                        description: "A microlearning training series designed to help instructors make quick, impactful accessibility improvements to their courses.",
                        challenge: "Instructors often felt overwhelmed by technical audits and didn't know how to apply them to their specific course content.",
                        solution: "Designed 'Pitstops'—bite-sized modules focusing on one task at a time, like writing effective alternative text or fixing heading hierarchies.",
                        outcome: "Increased instructor engagement with accessibility resources and significantly improved internal course audit scores.",
                        tools: ["Canva", "Brightspace LMS", "Modern Campus CMS"],
                        color: "bg-[#FDF2F2]",
                        textColor: "text-[#8D6E63]"
                    },
                    {
                        id: "narrator",
                        title: "Windows Narrator Guide",
                        category: "Technical Documentation",
                        tag: "Accessibility",
                        description: "A comprehensive, plain-language guide for screen reader navigation tailored for new users and training sessions.",
                        challenge: "Standard screen reader documentation was often too technical for beginners, leading to a steep learning curve during faculty training.",
                        solution: "Created a visual, step-by-step guide translating complex keyboard shortcuts into a clear pedagogical path for new users.",
                        outcome: "Adopted as a core training resource for the Colorado Secretary of State fellowship program.",
                        tools: ["Microsoft Office", "Screen Readers", "Canva"],
                        color: "bg-[#FAF3E0]",
                        textColor: "text-[#B45309]"
                    },
                    {
                        id: "case-studies",
                        title: "Accessibility Case Studies",
                        category: "Instructional Materials",
                        tag: "ID + Accessibility",
                        description: "Developed case studies and tutorials for accessibility training to bridge the gap between theory and practice.",
                        challenge: "Standard accessibility training lacked real-world context for how issues impact students with disabilities.",
                        solution: "Built interactive case studies showcasing user personas and specific digital barriers in a sandbox LMS environment.",
                        outcome: "Improved technical proficiency and empathy among training participants during live workshops.",
                        tools: ["D2L Brightspace", "Video Walkthroughs", "NVDA"],
                        color: "bg-[#FCE4EC]",
                        textColor: "text-[#AD1457]"
                    }
                ]
            };

            const navigateToProject = (project) => {
                setSelectedProject(project);
                setActivePage('project-detail');
                window.scrollTo(0, 0);
            };

            const LogoMonogram = ({ size = "w-10 h-10" }) => (
                <div className={`${size} border border-[#D4AF37] rounded-full flex items-center justify-center group-hover:bg-[#FDF2F2] transition-all duration-300 bg-white relative`}>
                    <span 
                        className="text-[#5D4037] text-4xl lowercase italic font-monogram transition-colors duration-300" 
                        style={{ fontWeight: '200', letterSpacing: '-2px', transform: 'translateY(-2px)' }}
                    >
                        {profile.monogram}
                    </span>
                </div>
            );

            const Navigation = () => (
                <nav className="fixed top-0 w-full bg-white/95 border-b border-[#FDF2F2] z-50 px-6 py-4 backdrop-blur-md">
                    <div className="max-w-6xl mx-auto flex justify-between items-center">
                        <button onClick={() => { setActivePage('home'); setSelectedProject(null); }} className="flex items-center gap-4 group">
                            <LogoMonogram size="w-14 h-14" />
                            <div className="flex flex-col items-start leading-none text-left">
                                <span className="font-black text-lg tracking-tight text-[#5D4037]">Natasha Kippur</span>
                                <span className="text-[9px] font-bold uppercase tracking-[0.2em] text-[#D4AF37]">Version 0.4</span>
                            </div>
                        </button>
                        <div className="hidden md:flex items-center gap-10">
                            <button onClick={() => setActivePage('home')} className={`text-xs font-black uppercase tracking-[0.2em] ${activePage === 'home' ? 'text-[#D4AF37]' : 'text-[#8D6E63] hover:text-[#D4AF37]'}`}>Home</button>
                            <button onClick={() => setActivePage('projects')} className={`text-xs font-black uppercase tracking-[0.2em] ${activePage === 'projects' ? 'text-[#D4AF37]' : 'text-[#8D6E63] hover:text-[#D4AF37]'}`}>Portfolio</button>
                            <button onClick={() => setActivePage('contact')} className={`text-xs font-black uppercase tracking-[0.2em] ${activePage === 'contact' ? 'text-[#D4AF37]' : 'text-[#8D6E63] hover:text-[#D4AF37]'}`}>Contact</button>
                        </div>
                    </div>
                </nav>
            );

            const Home = () => (
                <div className="animate-in pt-32 pb-20 px-6 max-w-6xl mx-auto grid md:grid-cols-2 gap-16 items-center">
                    <div className="space-y-8">
                        <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-[#FDF2F2] text-[#AD1457] rounded-full text-[10px] font-black uppercase tracking-[0.2em]">
                            <Sparkles size={12} /> Designing for Everyone
                        </div>
                        <h1 className="text-5xl md:text-7xl font-black leading-[1.1]">
                            <span className="text-[#5D4037]">Inclusive</span> <span className="text-[#D4AF37] underline decoration-[#FDF2F2] underline-offset-8">Design</span>, <span className="text-[#5D4037]">Human Impact.</span>
                        </h1>
                        <p className="text-xl text-[#8D6E63] leading-relaxed max-w-xl">{profile.summary}</p>
                        <div className="flex flex-wrap gap-4">
                            <button onClick={() => setActivePage('projects')} className="bg-[#D4AF37] text-white px-8 py-4 rounded-xl font-bold hover:bg-[#B8860B] transition-all shadow-lg">Explore Portfolio</button>
                            <a href={`mailto:${profile.contact.email}`} className="border-2 border-[#FDF2F2] text-[#8D6E63] px-8 py-4 rounded-xl font-bold hover:bg-[#FFF9F9] transition-all">Get In Touch</a>
                        </div>
                    </div>
                    <div className="bg-white rounded-[2.5rem] p-12 border border-[#FDF2F2] shadow-xl grid grid-cols-2 gap-6 relative overflow-hidden">
                        <div className="bg-[#FFF9F9] p-6 rounded-2xl border border-[#FDF2F2] flex flex-col justify-between h-40">
                            <Accessibility className="text-[#D4AF37]" size={32} />
                            <h3 className="font-black text-[#5D4037] text-sm">WCAG Specialist</h3>
                        </div>
                        <div className="bg-[#D4AF37] p-6 rounded-2xl flex flex-col justify-between h-40 text-white mt-6 shadow-lg shadow-amber-200">
                            <BookOpen size={32} />
                            <h3 className="font-black text-sm">Instructional Design</h3>
                        </div>
                        <div className="bg-[#5D4037] p-6 rounded-2xl flex flex-col justify-between h-40 text-white">
                            <Layout size={32} />
                            <h3 className="font-black text-sm">Microlearning</h3>
                        </div>
                        <div className="bg-[#FFF9F9] p-6 rounded-2xl border border-[#FDF2F2] flex flex-col justify-between h-40 mt-6">
                            <Video className="text-[#D4AF37]" size={32} />
                            <h3 className="font-black text-[#5D4037] text-sm">Visual Training</h3>
                        </div>
                    </div>
                </div>
            );

            const ProjectList = () => (
                <div className="pt-40 pb-24 px-6 max-w-6xl mx-auto animate-in">
                    <h1 className="text-5xl font-black text-[#5D4037] mb-4 tracking-tighter">Full Portfolio</h1>
                    <p className="text-xl text-[#8D6E63] mb-16 max-w-2xl font-medium">A deep dive into projects centered on accessibility testing and instructional design.</p>
                    <div className="grid md:grid-cols-3 gap-8">
                        {profile.projects.map(project => (
                            <div key={project.id} className="group cursor-pointer bg-white rounded-[2rem] overflow-hidden border border-[#FDF2F2] hover:shadow-2xl transition-all flex flex-col" onClick={() => navigateToProject(project)}>
                                <div className={`h-48 ${project.color} flex items-center justify-center`}>
                                    <FileText className="text-[#D4AF37]/30" size={56} />
                                </div>
                                <div className="p-8 flex-grow">
                                    <span className="text-[#AD1457] font-black text-[10px] uppercase tracking-[0.2em] mb-3 block">{project.tag}</span>
                                    <h3 className="text-xl font-black text-[#5D4037] mb-4">{project.title}</h3>
                                    <p className="text-[#8D6E63] text-sm leading-relaxed mb-6">{project.description}</p>
                                    <div className="h-[1px] bg-[#FDF2F2] mb-6"></div>
                                    <button className="text-[#D4AF37] font-black text-xs uppercase tracking-widest flex items-center gap-2 group-hover:translate-x-1 transition-all">See Case Study <ChevronRight size={14} /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const ProjectDetail = ({ project }) => (
                <div className="animate-in">
                    <div className={`pt-48 pb-24 ${project.color} px-6`}>
                        <div className="max-w-4xl mx-auto">
                            <button onClick={() => setActivePage('projects')} className="mb-12 flex items-center gap-2 font-black text-[10px] uppercase tracking-[0.2em] text-[#AD1457] hover:opacity-70 transition-opacity"><ArrowLeft size={16} /> Portfolio</button>
                            <div className="space-y-6 text-left">
                                <span className="bg-white/40 text-[#AD1457] px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em]">{project.category}</span>
                                <h1 className="text-5xl md:text-7xl font-black text-[#5D4037] tracking-tighter leading-tight">{project.title}</h1>
                                <p className="text-2xl text-[#8D6E63] max-w-2xl font-medium leading-relaxed">{project.description}</p>
                            </div>
                        </div>
                    </div>
                    <div className="max-w-4xl mx-auto px-6 py-24">
                        <div className="grid md:grid-cols-3 gap-16">
                            <div className="md:col-span-2 space-y-20 text-left">
                                <section>
                                    <h2 className="text-[10px] font-black text-[#D4AF37] uppercase tracking-[0.3em] mb-6">The Challenge</h2>
                                    <p className="text-xl text-[#5D4037] leading-relaxed font-medium">{project.challenge}</p>
                                </section>
                                <section>
                                    <h2 className="text-[10px] font-black text-[#D4AF37] uppercase tracking-[0.3em] mb-6">The Solution</h2>
                                    <p className="text-xl text-[#5D4037] leading-relaxed font-medium">{project.solution}</p>
                                </section>
                                <section className="bg-[#FFF9F9] p-12 rounded-[2.5rem] border border-[#FDF2F2]">
                                    <h2 className="text-[10px] font-black text-[#AD1457] uppercase tracking-[0.3em] mb-8">Impact & Results</h2>
                                    <div className="flex gap-6 items-start">
                                        <div className="p-4 bg-white rounded-2xl shadow-sm text-[#D4AF37]"><Award size={32} /></div>
                                        <p className="text-2xl font-black text-[#5D4037] tracking-tight leading-snug italic">"{project.outcome}"</p>
                                    </div>
                                </section>
                            </div>
                            <aside className="space-y-12 text-left">
                                <div>
                                    <h3 className="text-[10px] font-black text-[#8D6E63] uppercase tracking-[0.2em] mb-6">Tech Stack</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {project.tools.map(tool => (<span key={tool} className="bg-white border border-[#FDF2F2] px-4 py-2 rounded-xl text-xs font-bold text-[#5D4037] shadow-sm">{tool}</span>))}
                                    </div>
                                </div>
                                <div className="pt-10 border-t border-[#FDF2F2]">
                                    <h3 className="text-[10px] font-black text-[#8D6E63] uppercase tracking-[0.2em] mb-4">Role</h3>
                                    <p className="font-black text-[#5D4037] text-lg">Lead Instructional Designer</p>
                                </div>
                                <button onClick={() => setActivePage('contact')} className="w-full bg-[#5D4037] text-white py-5 rounded-2xl font-black text-sm hover:bg-[#3E2723] transition-all flex items-center justify-center gap-3 shadow-lg">Start a Conversation <ExternalLink size={18} /></button>
                            </aside>
                        </div>
                    </div>
                </div>
            );

            const Contact = () => (
                <div className="pt-40 pb-24 px-6 max-w-4xl mx-auto animate-in">
                    <div className="text-center mb-20">
                        <h1 className="text-6xl font-black text-[#5D4037] mb-6 tracking-tighter">Get in Touch</h1>
                        <p className="text-xl text-[#8D6E63] max-w-2xl mx-auto font-medium">Whether you need an accessibility audit or an engaging microlearning course, I’m ready to collaborate.</p>
                    </div>
                    <div className="grid md:grid-cols-2 gap-8 bg-[#FFF9F9] rounded-[3rem] p-4 border border-[#FDF2F2] shadow-2xl">
                        <div className="bg-[#5D4037] p-12 rounded-[2.5rem] text-white space-y-12 text-left">
                            <h2 className="text-3xl font-black">Contact Details</h2>
                            <div className="space-y-8">
                                <div className="flex items-center gap-6 group"><div className="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center group-hover:bg-[#D4AF37] transition-all"><Mail size={24} /></div><div><p className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40">Email</p><p className="font-bold text-lg">{profile.contact.email}</p></div></div>
                                <div className="flex items-center gap-6 group"><div className="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center group-hover:bg-[#D4AF37] transition-all"><Phone size={24} /></div><div><p className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40">Phone</p><p className="font-bold text-lg">{profile.contact.phone}</p></div></div>
                                <div className="flex items-center gap-6 group"><div className="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center group-hover:bg-[#D4AF37] transition-all"><MapPin size={24} /></div><div><p className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40">Location</p><p className="font-bold text-lg">{profile.contact.location}</p></div></div>
                            </div>
                        </div>
                        <div className="p-8 md:p-12 bg-white rounded-[2.5rem]">
                            <form className="space-y-6 text-left" onSubmit={e => e.preventDefault()}>
                                <div className="space-y-2"><label className="text-[10px] font-black text-[#AD1457] uppercase tracking-widest">Name</label><input type="text" className="w-full bg-[#FFF9F9] border-none rounded-xl p-4 focus:ring-2 focus:ring-[#D4AF37] outline-none" placeholder="Natasha Kippur" /></div>
                                <div className="space-y-2"><label className="text-[10px] font-black text-[#AD1457] uppercase tracking-widest">Email</label><input type="email" className="w-full bg-[#FFF9F9] border-none rounded-xl p-4 focus:ring-2 focus:ring-[#D4AF37] outline-none" placeholder="natasha@example.com" /></div>
                                <div className="space-y-2"><label className="text-[10px] font-black text-[#AD1457] uppercase tracking-widest">Message</label><textarea className="w-full bg-[#FFF9F9] border-none rounded-xl p-4 focus:ring-2 focus:ring-[#D4AF37] outline-none h-40" placeholder="Tell me about your team..."></textarea></div>
                                <button className="w-full bg-[#D4AF37] hover:bg-[#B8860B] text-white font-black py-5 rounded-2xl shadow-xl shadow-amber-100 transition-all">Send Message</button>
                            </form>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-white font-sans text-[#5D4037]">
                    <Navigation />
                    <main id="main-content">
                        {activePage === 'home' && <Home />}
                        {activePage === 'projects' && <ProjectList />}
                        {activePage === 'project-detail' && selectedProject && <ProjectDetail project={selectedProject} />}
                        {activePage === 'contact' && <Contact />}
                    </main>
                    <footer className="py-20 px-6 border-t border-[#FDF2F2] bg-[#FFF9F9]">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="flex items-center gap-3 group cursor-pointer" onClick={() => setActivePage('home')}>
                                <LogoMonogram size="w-10 h-10" />
                                <span className="font-black text-[#5D4037]">Natasha Kippur</span>
                            </div>
                            <div className="text-[#8D6E63] text-[10px] font-black uppercase tracking-[0.4em]">Accessible Design &copy; 2026</div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
